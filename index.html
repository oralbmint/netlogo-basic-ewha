<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업 자료</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px 20px;
            background: #f8f9fa;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 40px;
            font-size: 2.2em;
        }
        .link-card {
            background: #fff;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 25px;
            margin: 20px 0;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .link-card:hover {
            background: #f0f8ff;
            border-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            text-decoration: none;
            color: inherit;
        }
        .link-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .link-url {
            color: #7f8c8d;
            font-size: 0.9em;
            word-break: break-all;
        }
        .notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 수업 자료</h1>
        
        <div class="notice">
            💡 아래 링크를 클릭하여 수업 자료에 접속하세요
        </div>

        <a href="https://docs.google.com/document/d/17DoW0SkeYtD0cr255vp4h63FyTxc2yOjHuMrja815IQ/edit?usp=sharing" 
           class="link-card" target="_blank">
            <div class="link-title">📝 온라인 칠판</div>
            <div class="link-url">Google Docs 공유 문서</div>
        </a>

        <a href="https://github.com/oralbmint/netlogo-basic-ewha" 
           class="link-card" target="_blank">
            <div class="link-title">🎯 넷로고 기초</div>
            <div class="link-url">GitHub Repository</div>
        </a>

        <a href="https://github.com/oralbmint/netlogo-sinkhole-simulation" 
           class="link-card" target="_blank">
            <div class="link-title">🕳️ 싱크홀 시뮬레이션</div>
            <div class="link-url">GitHub Repository</div>
        </a>

        <footer style="margin-top: 40px; text-align: center; color: #7f8c8d; font-size: 0.9em;">
            <p>H.J. Park</p>
            <p>마지막 업데이트: 2026년 1월 25일</p>
        </footer>
    </div>
</body>
</html>
